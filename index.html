<!DOCTYPE html>
<html>
    <head>
        <title>Kali Sana</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,900&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
    </head>
    <body>
        <section class="intro">
            <h1> <strong>Welcome back!</strong> <br>You can now<strong> sign in</strong> to your account <strong></strong></h1>
            <span class="beta-text">Currently in Beta</span>
            <p class="top-text">Powered by Kali Sana</p>
        </section>
        
        <main class="main-content">
            <img class="img-main" src="images/logo.png" alt="My Scrimba avatar.">
            <h2>SIGN IN</h2>
            <!-- <span class="subheading">SIGN IN</span> -->
            
            <!-- <p>The colorful and iconic Scrimba avatars are no longer just for members of the Scrimba team and its Avengers-caliber group of code reviewers. You can Scrimbafy your photo today!</p> -->
            
            <form>
                <input type="email" required placeholder="Email" aria-label="Email">
                <input type="password" required placeholder="Password" aria-label="Password">
                <div class="checkbox-container">
                    <div class="checkbox-wrapper">
                        <input class="checkbox" type="checkbox" id="remember-me">
                     <label class="checkbox-label" for="remember-me">Remember me</label>
                    </div>
                     <p><a href="#">Forgot password?</a></p>
                </div>
                <button class="btn btn-primary">Login</button>
            </form>   
            <p class="fine-print">New to Kali Sana? <a href="#">Sign up</a></p>
        </main>
    </body>
</html>
